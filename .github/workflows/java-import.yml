name: Import Minecraft Modern Engine
on: workflow_dispatch

jobs:
  import-engine:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Modern Graphics
        run: |
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          # Installation des couches de compatibilité OpenGL 3.3+ (Mesa)
          dkp-pacman -Syy
          dkp-pacman -S --noconfirm switch-mesa switch-glad switch-glfw switch-glm
          
          mkdir -p deps/lib
          cp /opt/devkitpro/portlibs/switch/lib/libglad.a deps/lib/
          cp /opt/devkitpro/portlibs/switch/lib/libglfw3.a deps/lib/
          # On récupère la lib glapi indispensable pour le rendu des blocs
          cp /opt/devkitpro/portlibs/switch/lib/libglapi.a deps/lib/

      - name: Commit Modern Deps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/lib/*.a
          git commit -m "IMPORT : Moteur OpenGL pour Minecraft 1.20.1" || echo "Rien"
          git push
