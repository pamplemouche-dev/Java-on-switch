name: Force Import Minecraft Modern
on: workflow_dispatch

jobs:
  import-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare Deps Structure
        run: |
          # Création de la hiérarchie pour Forge et les mods
          mkdir -p deps/lib
          mkdir -p deps/include/linux
          mkdir -p romfs/mods
          
          # Installation de Java 17 pour extraire les binaires
          sudo apt-get update && sudo apt-get install -y openjdk-17-jdk-headless
          
          # Import du moteur Java (libjvm) pour régler l'erreur JNI_CreateJavaVM
          cp $(find /usr/lib/jvm/java-17-openjdk-amd64 -name "libjvm.so") deps/lib/
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/jni.h deps/include/
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/linux/jni_md.h deps/include/linux/

      - name: Setup RomFS Placeholder
        run: |
          # Instructions pour l'utilisateur
          echo "Place tes fichiers .jar (Forge, Create, Mekanism) dans le dossier romfs/mods/ de ton iPad." > romfs/readme.txt

      - name: Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/ romfs/
          git commit -m "IMPORT : Environnement Java 17 et structure Minecraft" || echo "Rien à ajouter"
          git push
