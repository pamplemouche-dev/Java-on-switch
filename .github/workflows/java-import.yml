name: Force Import Java ARM64
on: workflow_dispatch

jobs:
  import-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Java ARM64 Binary
        run: |
          mkdir -p deps/lib
          mkdir -p deps/include/linux
          # Téléchargement d'un JDK 17 ARM64 générique stable
          curl -L https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.8.1%2B1/OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.8.1_1.tar.gz -o java.tar.gz
          tar -xzf java.tar.gz
          
          # Extraction des fichiers nécessaires pour le linker
          cp jdk-17.0.8.1+1/lib/server/libjvm.so deps/lib/
          cp jdk-17.0.8.1+1/include/jni.h deps/include/
          cp jdk-17.0.8.1+1/include/linux/jni_md.h deps/include/linux/

      - name: Commit ARM64 Deps
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/
          git commit -m "FIX : Importation libjvm.so en version ARM64" || echo "Rien"
          git push
