name: Permanent Java Download
on: workflow_dispatch

jobs:
  download-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grab Java 17 ARM64
        run: |
          mkdir -p deps/java
          # Téléchargement direct du moteur Java pour architecture ARM64 (Switch)
          curl -L https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.8.1%2B1/OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.8.1_1.tar.gz -o java.tar.gz
          tar -xzf java.tar.gz --strip-components=1 -C deps/java
          
          # On déplace la libjvm là où le linker la cherche
          mkdir -p deps/lib
          cp deps/java/lib/server/libjvm.so deps/lib/
          
      - name: Commit Java to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/java/ deps/lib/libjvm.so
          git commit -m "📦 ADD: Java 17 ARM64 complet dans le repo"
          git push
