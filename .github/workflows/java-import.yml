name: Import Minecraft Engine
on: workflow_dispatch

jobs:
  import:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Java & Graphics
        run: |
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          # Installation des bibliothèques de rendu (pour Minecraft)
          dkp-pacman -Syy
          dkp-pacman -S --noconfirm switch-mesa switch-glad switch-glfw switch-libdrm-nouveau
          
          # Copie des fichiers binaires manquants
          mkdir -p deps/lib
          cp /opt/devkitpro/portlibs/switch/lib/libglad.a deps/lib/
          cp /opt/devkitpro/portlibs/switch/lib/libglfw3.a deps/lib/
          
          # NOTE : Pour libjvm.a, comme elle est lourde, on va s'assurer 
          # qu'elle est bien présente dans ton environnement de build.
