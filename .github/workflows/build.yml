name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java JDK
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Install dependencies
        run: |
          # On force la mise Ă  jour malgrĂ© les erreurs 403
          dkp-pacman -Syy --noconfirm || true
          dkp-pacman -S --noconfirm switch-curl switch-mbedtls switch-zlib libnx

      - name: Build NRO
        run: |
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # Localisation de Java
          JAVA_DIR=$(readlink -f /usr/bin/javac | sed "s:/bin/javac::")
          export JAVA_INC="-I$JAVA_DIR/include -I$JAVA_DIR/include/linux"
          
          # COMPILATION FINALE
          # On met le -mtls-dialect=desc UNIQUEMENT dans CXXFLAGS
          make CXXFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include $JAVA_INC -mtls-dialect=desc -O2" \
               LDFLAGS="-specs=$(pwd)/switch.specs -L$DEVKITPRO/libnx/lib -L$PORTLIBS/lib"

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
