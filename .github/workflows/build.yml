name: Titan-JVM Final Force Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile and Link
        run: |
          # 1. On définit les chemins absolus pour être sûr
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARCH64=/opt/devkitpro/devkita64
          export PATH=$PATH:$DEVKITPRO/tools/bin:$DEVKITARCH64/bin

          # 2. Compilation du binaire ELF
          # On utilise le compilateur croisé spécifique à la Switch
          /opt/devkitpro/devkita64/bin/aarch64-none-elf-g++ -O2 -march=armv8-a+crc+crypto \
          -mtune=cortex-a57 -mtp=soft -fPIE \
          -I/opt/devkitpro/libnx/include \
          -L/opt/devkitpro/libnx/lib \
          main.cpp -o MinecraftTitan.elf -lnx

          # 3. Utilisation de elf2nro pour créer le fichier Switch
          # On ne met pas d'icône pour l'instant pour éviter les erreurs de fichier manquant
          /opt/devkitpro/tools/bin/elf2nro MinecraftTitan.elf MinecraftTitan.nro \
          --name="Minecraft Titan" --author="pamplemouche-dev"

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Titan-Switch
          path: MinecraftTitan.nro
