name: Force Import Official Specs
on: workflow_dispatch

jobs:
  import:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and Verify
        run: |
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          mkdir -p deps/specs
          
          # Extraction du fichier original système
          cp /opt/devkitpro/libnx/switch.specs deps/specs/
          
          # Vérification de sécurité pour éviter le 0 octet
          if [ ! -s "deps/specs/switch.specs" ]; then
            echo "Erreur : Le fichier source est vide ou introuvable"
            exit 1
          fi

      - name: Commit Force
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/specs/switch.specs
          git commit -m "IMPORT FORCE : switch.specs officiel de devkitPro"
          git push
