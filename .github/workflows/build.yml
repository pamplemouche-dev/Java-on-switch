name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Mise à jour des dépôts devkitPro
          dkp-pacman -Syyu --noconfirm
          # Installation des bibliothèques nécessaires pour la Switch
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            libnx

      - name: Build NRO
        run: |
          # On définit les variables d'environnement pour le Makefile
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # DEBUG : On vérifie si les fichiers sont bien là (visible dans tes logs GitHub)
          echo "Vérification des bibliothèques installées :"
          ls -R $PORTLIBS/lib/libcurl.a || echo "ERREUR : Fichiers introuvables"
          
          # Lancement de la compilation
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
