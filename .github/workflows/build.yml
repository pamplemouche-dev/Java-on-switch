name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Correction des droits pour éviter les erreurs 403/accès
          sudo apt-get update
          sudo apt-get install -y wget
          
          # Installation forcée des paquets Switch
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            libnx

      - name: Build NRO
        run: |
          # Définition des chemins pour le compilateur
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # Lancement du Makefile
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
