name: Force Real Binaries
on: workflow_dispatch

jobs:
  fix-deps:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Overwrite with valid binaries
        run: |
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          mkdir -p deps/lib deps/include
          
          # Copie les vrais fichiers depuis l'image Docker (ils font plusieurs Mo ici)
          cp /opt/devkitpro/libnx/lib/libnx.a deps/lib/
          
          # Installation des portlibs pour avoir les vrais .a de curl et zlib
          dkp-pacman -Syy
          dkp-pacman -S --noconfirm switch-curl switch-zlib
          cp /opt/devkitpro/portlibs/switch/lib/libcurl.a deps/lib/
          cp /opt/devkitpro/portlibs/switch/lib/libz.a deps/lib/

      - name: Push fixed files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/lib/*.a
          git commit -m "Remplacement des fichiers de 0 octet par les vrais binaires"
          git push
