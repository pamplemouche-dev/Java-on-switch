name: Generate Deps Folder
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deps
        run: |
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          mkdir -p deps/include/switch deps/lib
          
          # 1. Copie libnx
          cp /opt/devkitpro/libnx/lib/libnx.a deps/lib/
          cp -r /opt/devkitpro/libnx/include/* deps/include/
          
          # 2. Installation et Copie des Portlibs (Curl, SSL, Zlib)
          # On les installe dans le container pour être sûr de les avoir
          dkp-pacman -Syy
          dkp-pacman -S --noconfirm switch-curl switch-mbedtls switch-zlib
          
          cp /opt/devkitpro/portlibs/switch/lib/*.a deps/lib/
          cp -r /opt/devkitpro/portlibs/switch/include/* deps/include/
          
          # 3. Java JNI
          apt-get update && apt-get install -y openjdk-17-jdk
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/jni.h deps/include/
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/linux/jni_md.h deps/include/

      - name: Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deps/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Vendoring COMPLET (Lib + Include)" && git push)
          
