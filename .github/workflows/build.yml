name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java JDK
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Install dependencies
        run: |
          # On force la mise à jour malgré les erreurs 403 potentielles
          dkp-pacman -Syy --noconfirm || true
          dkp-pacman -S --noconfirm switch-curl switch-mbedtls switch-zlib libnx

      - name: Build NRO
        run: |
          # 1. Configuration des chemins devkitPro
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # 2. Localisation précise des headers Java (jni.h)
          # On définit les chemins pour Ubuntu dans le conteneur
          export JAVA_INC="-I/usr/lib/jvm/java-17-openjdk-amd64/include -I/usr/lib/jvm/java-17-openjdk-amd64/include/linux"
          
          # 3. Compilation avec tous les chemins d'inclusion
          # On ajoute -mtls-dialect=desc pour corriger l'erreur __tls_align
          make CFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include $JAVA_INC" \
               CXXFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include $JAVA_INC -mtls-dialect=desc"

      - name: Upload NRO
        uses: upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
