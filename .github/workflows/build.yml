name: Titan-JVM Full Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          g++ -O3 main.cpp mini_jvm.cpp \
          -I./deps/include \
          -D__SWITCH__ \
          -o MinecraftTitan.elf
      - uses: actions/upload-artifact@v4
        with:
          name: Titan-Engine-Binary
          path: MinecraftTitan.elf
