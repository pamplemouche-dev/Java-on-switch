name: Titan-JVM Full Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          # On utilise -D pour simuler le fait que lock.h est deja la
          g++ -O3 main.cpp mini_jvm.cpp \
          -I./deps/include \
          -D_SYS_LOCK_H_ \
          -D__SWITCH__ \
          -o MinecraftTitan.elf
      - uses: actions/upload-artifact@v4
        with:
          name: Titan-Binary
          path: MinecraftTitan.elf
