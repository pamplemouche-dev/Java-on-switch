name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm switch-curl switch-openssl switch-zlib switch-libnx

      - name: Build NRO
        run: |
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v3
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
