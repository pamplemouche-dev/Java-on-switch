name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java JDK
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Install dependencies
        run: |
          # On force la mise à jour des outils Switch
          dkp-pacman -Syy --noconfirm || true
          dkp-pacman -S --noconfirm switch-curl switch-mbedtls switch-zlib libnx

      - name: Build NRO
        run: |
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # LA CLÉ EST ICI : On définit les chemins exacts pour JNI et SWITCH.H
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export CFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include -I$JAVA_HOME/include -I$JAVA_HOME/include/linux"
          
          # On ajoute l'option TLS pour corriger les erreurs rouges __tls_align
          export CXXFLAGS="$CFLAGS -mtls-dialect=desc"
          
          make
