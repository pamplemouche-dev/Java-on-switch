name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Mise à jour et installation des paquets spécifiques à la Switch
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            switch-libnx

      - name: Build NRO
        run: |
          # On compile en utilisant les outils installés
          make
