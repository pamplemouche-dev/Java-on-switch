name: Build Minecraft Switch (Full Engine)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17 Runtime (In-Memory)
        run: |
          mkdir -p $GITHUB_WORKSPACE/external_java
          curl -L https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.8.1%2B1/OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.8.1_1.tar.gz -o java.tar.gz
          tar -xzf java.tar.gz --strip-components=1 -C $GITHUB_WORKSPACE/external_java
          mkdir -p $GITHUB_WORKSPACE/deps/lib
          # On force le lien symbolique (-sf) pour écraser le fichier existant
          ln -sf $GITHUB_WORKSPACE/external_java/lib/server/libjvm.so $GITHUB_WORKSPACE/deps/lib/libjvm.so

      - name: Compile Project
        run: |
          export JAVA_HOME=$GITHUB_WORKSPACE/external_java
          make
        env:
          DEVKITPRO: /opt/devkitpro

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Switch-Beta
          path: "*.nro"
