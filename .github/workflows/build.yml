name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Java
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Install Switch Libs
        run: |
          dkp-pacman -Syy --noconfirm || true
          dkp-pacman -S --noconfirm switch-curl switch-mbedtls switch-zlib libnx

      - name: Build NRO
        run: |
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
