name: Build Switch NRO

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          # Installation des outils Switch et de Java pour les headers
          dkp-pacman -Syy
          dkp-pacman -S --noconfirm switch-curl switch-zlib
          apt-get update && apt-get install -y openjdk-17-jdk

      - name: Verify Dependencies
        run: |
          # On s'assure que les fichiers importés ne sont pas vides
          if [ ! -s "deps/specs/switch.specs" ]; then
            echo "ERREUR : switch.specs est manquant ou vide dans deps/specs/"
            exit 1
          fi
          if [ ! -s "deps/lib/libnx.a" ]; then
            echo "ERREUR : Les bibliothèques dans deps/lib sont invalides"
            exit 1
          fi
          echo "Vérification terminée avec succès."

      - name: Compile Project
        run: |
          # Définition du chemin Java pour le Makefile
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          # Nettoyage et compilation
          make clean
          make

      - name: Upload NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-Executable
          path: javaswitch.nro
