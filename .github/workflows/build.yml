name: Titan-JVM Native Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest # Utilise l'image officielle pour Switch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Minecraft Native (NRO)
        run: |
          # Compilation de la Mini-JVM et du Main
          # On lie les fichiers C++ ensemble sans aucune dépendance Java
          aarch64-none-elf-g++ -O2 -march=armv8-a+crc+crypto -mtune=cortex-a57 -mtp=soft -fPIE -I/opt/devkitpro/libnx/include -L/opt/devkitpro/libnx/lib -o minecraft_switch.elf main.cpp -lnx
          
          # Conversion en format NRO (le fichier pour la Switch)
          elf2nro minecraft_switch.elf MinecraftTitan.nro --icon=icon.jpg --romfs=romfs

      - name: Upload NRO Result
        uses: actions/upload-artifact@v3
        with:
          name: Minecraft-Titan-Switch
          path: MinecraftTitan.nro
