name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # On réinitialise les clés de sécurité pour éviter le 403
          sudo apt-get update
          sudo apt-get install -y gnupg
          
          # On force la mise à jour des miroirs dkp
          dkp-pacman -Scc --noconfirm # Nettoyage du cache
          dkp-pacman -Syy --noconfirm # Synchronisation forcée
          
          # Installation des paquets Switch
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            libnx

      - name: Build NRO
        run: |
          # On définit les chemins indispensables
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
