name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ÉTAPE CRUCIALE : Installer Java pour avoir jni.h
      - name: Install Java JDK
        run: |
          apt-get update
          apt-get install -y openjdk-17-jdk

      - name: Install dependencies
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            libnx

      - name: Build NRO
        run: |
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # On indique au compilateur où trouver jni.h (et switch.h)
          export CFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include -I/usr/lib/jvm/java-17-openjdk-amd64/include -I/usr/lib/jvm/java-17-openjdk-amd64/include/linux"
          export CXXFLAGS="$CFLAGS"
          
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
