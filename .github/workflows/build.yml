name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dkp-pacman -Syyu --noconfirm
          # Utilisation des noms exacts des paquets pour Switch
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            switch-libnx

      - name: Build NRO
        run: |
          # On s'assure que les variables d'environnement sont là
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
