name: Generate Deps Folder
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Deps
        run: |
          # Correction de la sécurité Git pour éviter l'erreur 128
          git config --global --add safe.directory /__w/Java-on-switch/Java-on-switch
          
          mkdir -p deps/include/switch deps/lib
          cp /opt/devkitpro/libnx/lib/libnx.a deps/lib/
          cp -r /opt/devkitpro/libnx/include/* deps/include/
          cp /opt/devkitpro/portlibs/switch/lib/libcurl.a deps/lib/
          cp -r /opt/devkitpro/portlibs/switch/include/* deps/include/
          
          # Java
          apt-get update && apt-get install -y openjdk-17-jdk
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/jni.h deps/include/
          cp /usr/lib/jvm/java-17-openjdk-amd64/include/linux/jni_md.h deps/include/

          # Push direct depuis l'action
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"
          git add deps/
          git commit -m "Vendoring total des deps (Corrected)"
          git push
