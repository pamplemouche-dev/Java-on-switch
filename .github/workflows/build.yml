name: Build JavaSwitch NRO

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # On s'assure que le gestionnaire de paquets est prûˆt
          dkp-pacman -Syyu --noconfirm
          # Installation des composants nûˋcessaires
          dkp-pacman -S --noconfirm \
            switch-curl \
            switch-mbedtls \
            switch-zlib \
            libnx

      - name: Build NRO
        run: |
          # On dûˋfinit les variables d'environnement cruciales
          export PORTLIBS=$DEVKITPRO/portlibs/switch
          export PATH=$PATH:$DEVKITPRO/devkitA64/bin
          
          # On force le compilateur û  voir les headers de libnx et des portlibs
          export CFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include"
          export CXXFLAGS="-I$DEVKITPRO/libnx/include -I$PORTLIBS/include"
          
          make

      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: JavaSwitch-NRO
          path: ./*.nro
